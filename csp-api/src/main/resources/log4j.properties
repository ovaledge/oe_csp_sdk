# Log4j configuration for csp-api
log4j.rootLogger=INFO, console, file, sse

# Console appender
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# File appender
log4j.appender.file=org.apache.log4j.RollingFileAppender
log4j.appender.file.File=logs/csp-api.log
log4j.appender.file.MaxFileSize=10MB
log4j.appender.file.MaxBackupIndex=10
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# Application specific loggers
log4j.logger.com.ovaledge.csp.apps=INFO

# Suppress verbose logging from dependencies
log4j.logger.org.springframework=WARN
log4j.logger.org.apache.http=WARN

# SSE appender for real-time log streaming to web clients
log4j.appender.sse=com.ovaledge.csp.apps.app.logging.SseLogAppender

